services:
  postgres:
    image: postgres:16-alpine
    container_name: finrep_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finrep_dev
    ports:
      - "5432:5432"
    volumes:
      - finrep_pgdata:/var/lib/postgresql/data

volumes:
  finrep_pgdata: